<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FBI Sales Hub — Agent Select</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Lato',sans-serif;min-height:100vh;background:linear-gradient(135deg,#fdf4f9,#f0e8ff,#e8f4fd);display:flex;flex-direction:column;align-items:center;padding:40px 16px}
  h1{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:#2d1b2e;margin-bottom:6px}
  .sub{font-size:14px;color:#9b6090;margin-bottom:40px;letter-spacing:.04em}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;max-width:800px;width:100%}
  .card{border-radius:18px;padding:30px 20px;text-align:center;text-decoration:none;color:#fff;transition:all .2s;box-shadow:0 4px 20px #0002;display:flex;flex-direction:column;align-items:center;gap:10px}
  .card:hover{transform:translateY(-4px);box-shadow:0 10px 32px #0003}
  .card .initial{width:60px;height:60px;border-radius:50%;background:#ffffff33;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:28px;font-weight:700}
  .card .name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700}
  .card .role{font-size:12px;opacity:.85;letter-spacing:.04em}
  footer{margin-top:48px;font-size:12px;color:#bba0bb}
</style>
</head>
<body>
  <div style="font-size:36px;margin-bottom:12px">🌸</div>
  <h1>FBI Sales Hub</h1>
  <div class="sub">FRED BEANS INSURANCE · SELECT YOUR DASHBOARD</div>

  <div class="grid">
    <a class="card" href="/index.html" style="background:linear-gradient(135deg,#c06099,#e891c8)">
      <div class="initial">B</div>
      <div class="name">Barbie</div>
      <div class="role">Sales Agent</div>
    </a>
    <a class="card" href="/keith.html" style="background:linear-gradient(135deg,#1e40af,#3b82f6)">
      <div class="initial">K</div>
      <div class="name">Keith</div>
      <div class="role">Sales Agent</div>
    </a>
    <a class="card" href="/dylan.html" style="background:linear-gradient(135deg,#0d9488,#2dd4bf)">
      <div class="initial">D</div>
      <div class="name">Dylan</div>
      <div class="role">Sales Agent</div>
    </a>
    <a class="card" href="/kelly.html" style="background:linear-gradient(135deg,#7c3aed,#a78bfa)">
      <div class="initial">K</div>
      <div class="name">Kelly</div>
      <div class="role">Sales Agent</div>
    </a>
    <a class="card" href="/hali.html" style="background:linear-gradient(135deg,#15803d,#4ade80)">
      <div class="initial">H</div>
      <div class="name">Hali</div>
      <div class="role">Sales Agent</div>
    </a>
    <a class="card" href="/andrew.html" style="background:linear-gradient(135deg,#1e3a5f,#4a90d9)">
      <div class="initial">A</div>
      <div class="name">Andrew</div>
      <div class="role">Sales Agent</div>
    </a>
  </div>

  <a class="card" href="/admin.html" style="background:linear-gradient(135deg,#4a0080,#8b00cc);max-width:800px;width:100%;margin-top:8px;flex-direction:row;justify-content:center;gap:16px;padding:18px 20px">
      <div style="font-size:28px">👑</div>
      <div style="text-align:left"><div class="name" style="font-size:18px">Admin Dashboard</div><div class="role">Frank · View all agents</div></div>
    </a>
    <footer>Fred Beans Insurance · Sales Hub v1.0</footer>
</body>
</html>
