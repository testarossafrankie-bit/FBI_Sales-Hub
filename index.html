const fmtPhone = (v) => { const d=v.replace(/\D/g,"").slice(0,10); if(d.length<=3) return d; if(d.length<=6) return `(${d.slice(0,3)}) ${d.slice(3)}`; return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`; };
const fmtCurrency = (v) => { const n=parseFloat(v.replace(/[^0-9.]/g,"")); if(isNaN(n)) return ""; return n.toLocaleString("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}); };
const getDIM = (y,m) => new Date(y,m+1,0).getDate();
const getFD  = (y,m) => new Date(y,m,1).getDay();
const pad    = (n)   => String(n).padStart(2,"0");
const iso    = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;
const fmtT   = (t)   => { if(!t) return ""; const [h,m]=t.split(":").map(Number); return `${h%12||12}:${pad(m)} ${h>=12?"PM":"AM"}`; };
const toMin  = (t)   => { const[h,m]=t.split(":").map(Number); return h*60+m; };
const toTime = (m)   => `${pad(Math.floor(m/60))}:${pad(m%60)}`;
const toAnnual = (amt, term) => { const n = parseFloat((amt||"").replace(/[^0-9.]/g,"")); if(isNaN(n)) return NaN; if(term==="Monthly") return n*12; if(term==="6-Month") return n*2; return n; };

const playAlertSound = () => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880; osc.type = "sine";
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
    setTimeout(() => {
      const osc2 = ctx.createOscillator(); const gain2 = ctx.createGain();
      osc2.connect(gain2); gain2.connect(ctx.destination);
      osc2.frequency.value = 1100; osc2.type = "sine";
      gain2.gain.setValueAtTime(0.3, ctx.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
      osc2.start(ctx.currentTime); osc2.stop(ctx.currentTime + 0.5);
    }, 200);
  } catch(e) {}
};

function LoginScreen({ onLogin }) {
  const [selectedAgent, setSelectedAgent] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");

  const handleLogin = () => {
    if (!selectedAgent) {
      setError("Please select your name");
      return;
    }
    const agent = AGENTS.find(a => a.key === selectedAgent);
    const correctPassword = agent.name + "2";
    if (password !== correctPassword) {
      setError("Incorrect password");
      return;
    }
    localStorage.setItem("salesHubAgent", selectedAgent);
    onLogin(agent);
  };

  const handleKeyPress = (e) => {
    if (e.key === "Enter") handleLogin();
  };

  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(135deg, #1e40af 0%, #7c3aed 50%, #1e40af 100%)",
      display: "flex",
      alignItems: "center",
      justifyContent: "center",
      padding: 20
    }}>
      <div style={{
        background: "#fff",
        borderRadius: 24,
        padding: "40px 36px",
        maxWidth: 400,
        width: "100%",
        boxShadow: "0 25px 80px rgba(0,0,0,0.3)"
      }}>
        <div style={{ textAlign: "center", marginBottom: 32 }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>🚗</div>
          <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 28, fontWeight: 700, color: "#1e3a5f", marginBottom: 4 }}>
            Sales Hub
          </div>
          <div style={{ fontFamily: "'Lato', sans-serif", fontSize: 14, color: "#5a7090" }}>
            Fred Beans Insurance
          </div>
        </div>

        {error && (
          <div style={{
            background: "#fde8e8",
            color: "#dc3545",
            borderRadius: 10,
            padding: "10px 14px",
            marginBottom: 16,
            fontFamily: "'Lato', sans-serif",
            fontSize: 13,
            textAlign: "center"
          }}>
            {error}
          </div>
        )}

        <div style={{ marginBottom: 16 }}>
          <label style={{
            fontFamily: "'Lato', sans-serif",
            fontSize: 11,
            fontWeight: 700,
            letterSpacing: ".08em",
            textTransform: "uppercase",
            color: "#7c3aed",
            marginBottom: 6,
            display: "block"
          }}>Select Your Name</label>
          <select
            value={selectedAgent}
            onChange={e => { setSelectedAgent(e.target.value); setError(""); }}
            style={{
              width: "100%",
              padding: "12px 14px",
              border: "2px solid #e9d5ff",
              borderRadius: 10,
              fontFamily: "'Lato', sans-serif",
              fontSize: 15,
              color: "#1e3a5f",
              background: "#fff",
              cursor: "pointer",
              outline: "none"
            }}
          >
            <option value="">— Choose agent —</option>
            {AGENTS.map(a => <option key={a.key} value={a.key}>{a.name}</option>)}
          </select>
        </div>

        <div style={{ marginBottom: 24 }}>
          <label style={{
            fontFamily: "'Lato', sans-serif",
            fontSize: 11,
            fontWeight: 700,
            letterSpacing: ".08em",
            textTransform: "uppercase",
            color: "#7c3aed",
            marginBottom: 6,
            display: "block"
          }}>Password</label>
          <input
            type="password"
            value={password}
            onChange={e => { setPassword(e.target.value); setError(""); }}
            onKeyPress={handleKeyPress}
            placeholder="Enter your password"
            style={{

}

function SalesHub({ agent, onLogout }) {

  const [aErr, setAErr] = useState("");
  const [upcomingFilter, setUpcomingFilter] = useState(7);
  const [weekStart, setWeekStart] = useState(()=>{ const d=new Date(); d.setDate(d.getDate()-d.getDay()); return iso(d.getFullYear(),d.getMonth(),d.getDate()); });
  const [alertItem, setAlertItem] = useState(null);
  const [dismissedAlerts, setDismissedAlerts] = useState(new Set());
  const scrollRef = useRef(null);
  const now = new Date();
  const todayISO = iso(now.getFullYear(), now.getMonth(), now.getDate());

  const loadData = useCallback(() => {
    const agentKey = CONFIG.agentKey;
    fetch(`/api/leads?agent=${agentKey}`).then(r=>r.json()).then(d=>{ if(Array.isArray(d)) setLeads(d); setLoaded(true); }).catch(()=>setLoaded(true));
    fetch(`/api/appts?agent=${agentKey}`).then(r=>r.json()).then(d=>{ if(Array.isArray(d)) setAppts(d); }).catch(()=>{});
  }, []);

  useEffect(()=>{
    loadData();
    // Refresh when window regains focus
    const onFocus = () => loadData();
    window.addEventListener("focus", onFocus);
    return () => window.removeEventListener("focus", onFocus);
  },[loadData]);

  useEffect(()=>{ if(!loaded) return; const t = setTimeout(()=>{ fetch(`/api/leads?agent=${CONFIG.agentKey}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({leads})}).catch(()=>{}); }, 600); return ()=>clearTimeout(t); },[leads, loaded]);
  useEffect(()=>{ if(!loaded) return; const t = setTimeout(()=>{ fetch(`/api/appts?agent=${CONFIG.agentKey}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({appts})}).catch(()=>{}); }, 600); return ()=>clearTimeout(t); },[appts, loaded]);

  useEffect(()=>{
    const checkAlerts = () => {
      const now = new Date();
      const todayStr = iso(now.getFullYear(), now.getMonth(), now.getDate());
      const nowMin = now.getHours() * 60 + now.getMinutes();
      for(const a of appts) {
        if(a.date === todayStr) {
          const apptMin = toMin(a.startTime);
          const diff = apptMin - nowMin;
          const alertKey = `appt-${a.id}-${a.date}-${a.startTime}`;
          if(diff >= 0 && diff <= 5 && !dismissedAlerts.has(alertKey)) { playAlertSound(); setAlertItem({ type: "appt", item: a, alertKey }); return; }
        }
      }
      for(const l of leads) {
        if(l.followUpDate === todayStr && l.followUpTime) {
          const leadMin = toMin(l.followUpTime);
          const diff = leadMin - nowMin;
          const alertKey = `lead-${l.id}-${l.followUpDate}-${l.followUpTime}`;
          if(diff >= 0 && diff <= 5 && !dismissedAlerts.has(alertKey)) { playAlertSound(); setAlertItem({ type: "lead", item: l, alertKey }); return; }
        }
      }
    };
    checkAlerts();
    const interval = setInterval(checkAlerts, 30000);
    return () => clearInterval(interval);
  }, [appts, leads, dismissedAlerts]);

  const saveAppt = () => { if(!aForm.title.trim()){setAErr("Title is required.");return;} if(!aForm.date){setAErr("Date is required.");return;} if(editAId){ setAppts(as=>as.map(a=>a.id===editAId?{...aForm,id:editAId}:a)); toast2("Appointment updated!"); } else { setAppts(as=>[{...aForm,id:"a"+Date.now()},...as]); toast2("Appointment added!"); } setShowAF(false); setEditAId(null); setAForm(DA); };
  const delAppt = (id) => { setAppts(as=>as.filter(a=>a.id!==id)); setSelAppt(null); toast2("Appointment removed.","info"); };

  const yr=calDate.getFullYear(), mo=calDate.getMonth();
  const dv=dayView||todayISO;
  const dvDate=new Date(dv+"T12:00:00");
  const dayApts=appts.filter(a=>a.date===dv).sort((a,b)=>toMin(a.startTime)-toMin(b.startTime));

  const todayApts=appts.filter(a=>a.date===todayISO).sort((a,b)=>toMin(a.startTime)-toMin(b.startTime));
  const nowMin=now.getHours()*60+now.getMinutes();
  const prevDay=()=>{ const d=new Date(dv+"T12:00:00"); d.setDate(d.getDate()-1); setDayView(iso(d.getFullYear(),d.getMonth(),d.getDate())); };
  const nextDay=()=>{ const d=new Date(dv+"T12:00:00"); d.setDate(d.getDate()+1); setDayView(iso(d.getFullYear(),d.getMonth(),d.getDate())); };
  const itemsOnDay=(i)=>({ leads:leads.filter(x=>x.followUpDate===i), appts:appts.filter(x=>x.date===i).sort((a,b)=>toMin(a.startTime)-toMin(b.startTime)) });
  const upcoming = [...leads.filter(l=>l.followUpDate).map(l=>({kind:"lead",date:l.followUpDate,time:l.followUpTime||"09:00",label:l.name,sub:l.phone,status:l.status,obj:l})),...appts.map(a=>({kind:"appt",date:a.date,time:a.startTime,label:a.title,sub:a.type,type:a.type,obj:a}))].filter(x=>{ if(upcomingFilter===0) return x.date===todayISO; const d=new Date(x.date+"T12:00:00"); const df=(d-now)/86400000; return df>=-0.5&&df<=upcomingFilter; }).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const weekDates = Array.from({length:7},(_,i)=>{ const d=new Date(weekStart+"T12:00:00"); d.setDate(d.getDate()+i); return iso(d.getFullYear(),d.getMonth(),d.getDate()); });

rder:`1.5px solid ${ac}44`,display:"flex",gap:10,alignItems:"center"}}><span style={{fontSize:18}}>👤</span><div><div style={{fontFamily:"'Lato',sans-serif",fontSize:11,fontWeight:700,color:CONFIG.accent}}>Linked Customer</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:700,color:"#1e3a5f"}}>{linked.name} · {linked.phone}</div></div></div>)}{a.notes&&<div style={{background:CONFIG.tint,borderRadius:10,padding:"11px 13px",marginBottom:13}}><div style={{fontFamily:"'Lato',sans-serif",fontSize:9,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:CONFIG.accent,marginBottom:4}}>Notes</div><div style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#1e3a5f",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{a.notes}</div></div>}<div style={{display:"flex",gap:10,flexWrap:"wrap"}}><button className="bb" onClick={()=>openEditAppt(a)} style={{flex:1,background:`linear-gradient(135deg,${CONFIG.colorFrom},${CONFIG.colorTo})`,color:"#fff",padding:"10px 0",fontSize:13}}>Edit</button>{isLeadType&&a.customerPhone&&<a href={`tel:${a.customerPhone.replace(/\D/g,"")}`} className="bb" style={{background:`${ac}22`,color:CONFIG.accent,padding:"10px 14px",fontSize:13,textDecoration:"none"}}>Call</a>}<button className="bb" onClick={()=>delAppt(a.id)} style={{background:"#fde8e8",color:"#dc3545",padding:"10px 13px",fontSize:13}}>Remove</button></div></div></div>);})()}

      {selLead&&(()=>{const l=selLead, sc=STATUS_COLORS[l.status]||STATUS_COLORS["New Lead"];const prevAnn=toAnnual(l.prevPremium,l.prevTerm);const quotAnn=toAnnual(l.quotedPremium,l.quotedTerm);const savings=!isNaN(prevAnn)&&!isNaN(quotAnn)&&prevAnn>quotAnn?prevAnn-quotAnn:null;return(<div className="mbg" onClick={e=>{if(e.target===e.currentTarget)setSelLead(null)}}><div className="mo"><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:15}}><div><div style={{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:700,color:"#1e3a5f"}}>{l.name}</div><div style={{display:"flex",gap:6,marginTop:5,flexWrap:"wrap"}}><span style={{fontSize:11,padding:"3px 10px",borderRadius:50,background:sc.bg,color:sc.text,fontFamily:"'Lato',sans-serif",fontWeight:700}}>{l.status}</span>{l.company&&<span style={{fontSize:11,padding:"3px 10px",borderRadius:50,background:`${ac}22`,color:CONFIG.accent,fontFamily:"'Lato',sans-serif",fontWeight:700}}>{l.company}</span>}</div></div><button className="bb" onClick={()=>setSelLead(null)} style={{background:`${ac}22`,color:CONFIG.accent,padding:"4px 11px",fontSize:15,flexShrink:0}}>✕</button></div><div className="g2" style={{marginBottom:13}}>{[{l:"Phone",v:l.phone||"—"},{l:"Follow-Up",v:l.followUpDate?`${l.followUpDate} · ${fmtT(l.followUpTime||"09:00")}`:"Not set"},{l:"Current Premium",v:l.prevPremium?`${l.prevPremium} (${l.prevTerm||"Monthly"})`:"—"},{l:"Quoted Premium",v:l.quotedPremium?`${l.quotedPremium} (${l.quotedTerm||"Monthly"})`:"—"}].map(x=>(<div key={x.l} style={{background:CONFIG.tint,borderRadius:10,padding:"10px 13px"}}><div style={{fontFamily:"'Lato',sans-serif",fontSize:9,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:CONFIG.accent,marginBottom:3}}>{x.l}</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:14,color:"#1e3a5f"}}>{x.v}</div></div>))}</div>{savings&&(<div style={{background:"#d4edda",borderRadius:10,padding:"11px 15px",marginBottom:13,display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:20}}>💰</span><div><div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700,color:"#155724"}}>Saves ${Math.round(savings).toLocaleString()}/year</div><div style={{fontFamily:"'Lato',sans-serif",fontSize:11,color:"#1e7e34"}}>${Math.round(savings/12).toLocaleString()}/month savings</div></div></div>)}{l.notes&&<div style={{background:CONFIG.tint,borderRadius:10,padding:"11px 13px",marginBottom:13}}><div style={{fontFamily:"'Lato',sans-serif",fontSize:9,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:CONFIG.accent,marginBottom:4}}>Notes</div><div style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#1e3a5f",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{l.notes}</div></div>}<div style={{display:"flex",gap:10,flexWrap:"wrap"}}><button className="bb" onClick={()=>openEditLead(l)} style={{flex:1,background:`linear-gradient(135deg,${CONFIG.colorFrom},${CONFIG.colorTo})`,color:"#fff",padding:"10px 0",fontSize:13}}>Edit</button>{l.phone&&<a href={`tel:${l.phone.replace(/\D/g,"")}`} className="bb" style={{background:`${ac}22`,color:CONFIG.accent,padding:"10px 14px",fontSize:13,textDecoration:"none",display:"inline-flex",alignItems:"center"}}>Call</a>}<button className="bb" onClick={()=>delLead(l.id)} style={{background:"#fde8e8",color:"#dc3545",padding:"10px 13px",fontSize:13}}>Remove</button></div></div></div>);})()}

      {toast&&<div className="tst" style={{background:toast.type==="success"?"#28a745":toast.type==="info"?"#6c757d":"#dc3545",color:"#fff"}}>{toast.msg}</div>}
    </div>
  );
}

function App() {
  const [currentAgent, setCurrentAgent] = useState(() => {
    const saved = localStorage.getItem("salesHubAgent");
    if (saved) {
      const agent = AGENTS.find(a => a.key === saved);
      if (agent) return agent;
    }
    return null;
  });

  const handleLogin = (agent) => {
    setCurrentAgent(agent);
  };

  const handleLogout = () => {
    localStorage.removeItem("salesHubAgent");
    setCurrentAgent(null);
  };

  if (!currentAgent) {
    return <LoginScreen onLogin={handleLogin} />;
  }

  return <SalesHub agent={currentAgent} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
